image: mcr.microsoft.com/dotnet/sdk:10.0

stages:
  - build
  - test
  - pack

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_NOLOGO: "true"
  NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"
  CI: "true"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .nuget/packages

build:
  stage: build
  script:
    - dotnet restore Templar.slnx
    - dotnet build Templar.slnx --no-restore -c Release
  artifacts:
    paths:
      - src/bin/
      - src/obj/
      - tests/bin/
      - tests/obj/
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

test:
  stage: test
  dependencies:
    - build
  script:
    # coverlet.msbuild runs synchronous with the test runner — no race
    # condition reading the coverage file (unlike coverlet.collector
    # `--collect:"XPlat Code Coverage"`).
    - dotnet test Templar.slnx --no-build -c Release
        /p:CollectCoverage=true
        /p:CoverletOutputFormat=cobertura
        /p:CoverletOutput=$CI_PROJECT_DIR/tests/coverage/
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: tests/coverage/coverage.cobertura.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

pack:
  stage: pack
  dependencies:
    - build
  script:
    - dotnet pack src/Templar.csproj --no-build -c Release -o $CI_PROJECT_DIR/artifacts
  artifacts:
    paths:
      - artifacts/*.nupkg
      - artifacts/*.snupkg
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
